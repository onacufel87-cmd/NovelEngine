name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: 安装前端依赖
        run: npm ci

      - name: Rust 单元测试
        working-directory: src-tauri
        run: cargo test

      - name: 前端构建
        run: npm run build

      - name: Tauri 构建（NSIS）
        run: npm run tauri build
